

app = "smart-redactor-kindway"
primary_region = "bom"       

# Build configuration
[build]
  dockerfile = "Dockerfile"

# HTTP service configuration
[http_service]
  internal_port = 8000
  force_https = true          
  auto_stop_machines = true   
  auto_start_machines = true
  min_machines_running = 1    
  processes = ["app"]

[mounts]
  source = "redaction_tmp"
  destination = "/tmp"
  size = "512mb"  

[env]
  ENVIRONMENT = "production"
  PORT = "8000"
  PYTHONUNBUFFERED = "1"

[checks]
  [checks.health]
    port = 8000
    type = "http"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
    protocol = "http"
    tls_skip_verify = false

[[vm]]
  memory = "512mb"   # Sufficient for PDF processing + NLP models
  cpu_kind = "shared"
  cpus = 1

[[processes]]
  name = "worker"
  command = "celery -A python.worker.tasks worker --loglevel=info --concurrency=1"

[[vm]]
  processes = ["worker"]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

